<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .danger { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
        #strength-bar { height: 10px; background: #ddd; border-radius: 5px; margin-top: 5px; }
        #strength-bar div { height: 100%; border-radius: 5px; transition: width 0.3s; }
        .requirements { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <h2>Register</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" id="password" name="password" placeholder="Password" required>
        <div class="requirements">Min 12 chars, no common passwords</div>
        <div id="strength-bar"><div id="strength-fill" style="width:0%; background:#ddd;"></div></div>
        <div id="strength-text" style="font-size:12px; margin-bottom:10px;"></div>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
        <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="/login">Login</a></p>
    
    <script>
        document.getElementById('password').addEventListener('input', async function() {
            const response = await fetch('/password-strength', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: this.value })
            });
            const data = await response.json();
            const fill = document.getElementById('strength-fill');
            const text = document.getElementById('strength-text');
            fill.style.width = data.strength + '%';
            const colors = ['#ddd', '#ff6b6b', '#ffa94d', '#ffd93d', '#6bcb77', '#4d96ff'];
            fill.style.background = colors[Math.floor(data.strength / 20)] || '#4d96ff';
            text.textContent = data.valid ? '✅ Strong password' : '❌ ' + data.errors.join(', ');
        });
    </script>
</body>
</html>
