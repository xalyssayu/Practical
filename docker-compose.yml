services:
  # ============================================
  # 1. NGINX - Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: nginx-webserver
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - app-network
    depends_on:
      - secure-web

  # ============================================
  # 2. SECURE WEB APP - Flask
  # ============================================
  secure-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-web-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - FLASK_APP=main.py
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://app_user:secure_pass@secure-db:5432/app_db
      - SECRET_KEY=your-secret-key-change-in-production
    volumes:
      - ./app:/app
    depends_on:
      - secure-db
    networks:
      - app-network

  # ============================================
  # 3. POSTGRES DATABASE
  # ============================================
  secure-db:
    image: postgres:15
    container_name: secure-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=secure_pass
      - POSTGRES_DB=app_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # ============================================
  # 4. GITEA - Git Server
  # ============================================
  gitea:
    image: gitea/gitea:latest
    container_name: gitea-server
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__DOMAIN=127.0.0.1
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=https://127.0.0.1/git
      - GITEA__server__DISABLE_SSH=false
      - GITEA__server__SSH_PORT=22
      - GITEA__server__SSH_DOMAIN=127.0.0.1
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - app-network

  # ============================================
  # 5. GIT SSH SERVER (Optional)
  # ============================================
  git-server:
    image: alpine:latest
    container_name: git-ssh-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:2223:22"
    volumes:
      - ./git-repos:/home/git/repos
      - ./keys:/home/git/.ssh
    environment:
      - GIT_USER=Alyssa_Yu
      - GIT_EMAIL=2402077@sit.singaporetech.edu.sg
    entrypoint: |
      sh -c "
        apk add --no-cache openssh git openssh-server && \
        adduser -D -g 'Git User' git && \
        echo 'git:git' | chpasswd && \
        mkdir -p /home/git/.ssh && \
        chown -R git:git /home/git && \
        chmod 700 /home/git/.ssh && \
        echo '# SSH Config' > /etc/ssh/sshd_config && \
        echo 'Port 22' >> /etc/ssh/sshd_config && \
        echo 'PubkeyAuthentication yes' >> /etc/ssh/sshd_config && \
        echo 'AuthorizedKeysFile .ssh/authorized_keys' >> /etc/ssh/sshd_config && \
        echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config && \
        echo 'PermitEmptyPasswords no' >> /etc/ssh/sshd_config && \
        echo 'ChallengeResponseAuthentication no' >> /etc/ssh/sshd_config && \
        echo 'UsePAM no' >> /etc/ssh/sshd_config && \
        echo 'Subsystem sftp internal-sftp' >> /etc/ssh/sshd_config && \
        ssh-keygen -A && \
        /usr/sbin/sshd -D -e
      "
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: